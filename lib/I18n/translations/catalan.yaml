STR_README_TOPIC_SHORTCUTS: "Personalitza la llar i les aplicacions"
STR_README_SYNC_DAY_BODY: "L'Xteink X4 no s'ha de tractar com si tinguГғВ©s un rellotge en temps real fiable que sobreviu al son d'una manera fiable. Per tant, aquesta forquilla utilitza un model prГғВ ctic:\n\n1. Sync Day es connecta per Wi-Fi i obtГғВ© la data/hora actuals mitjanГғВ§ant NTP.\n2. Aquesta data esdevГғВ© la referГғВЁncia vГғВ lida per a les estadГғВӯstiques.\n3. Si mГғВ©s tard el dispositiu perd un rellotge actual vГғВ lid, el microprogramari tornarГғВ  a la darrera data vГғВ lida desada.\n4. Quan la capГғВ§alera mostra una data alternativa en lloc d'una nova data sincronitzada, es marca amb !.\n\nSignificat prГғВ ctic:\n- Normalment n'hi ha prou amb una sincronitzaciГғВі al dia abans de llegir\n- desprГғВ©s d'aixГғВІ, les estadГғВӯstiques continuen utilitzant l'ГғВәltim dia desat vГғВ lid\n- Si el dia real canvia, haurГғВӯeu de tornar a sincronitzar-vos\n\nPer defecte, la zona horГғВ ria ГғВ©s \"Espanya / Madrid\". Podeu seleccionar la vostra zona horГғВ ria i el format de data a ConfiguraciГғВі > Aplicacions."
STR_README_STATS_BODY: "Regles:\n- Cal connectar-se al WiГўвӮ¬вҖҳFi 1 cop al dia.\n- Calen com a mГғВӯnim 3 minuts de lectura perquГғВЁ es comptin dades.\n\nPer poder registrar estadГғВӯstiques cal identificar el dia.\n1. Configura prГғВЁviament la connexiГғВі WiГўвӮ¬вҖҳFi.\n2. Prem 1 cop al dia (abans de llegir) el botГғВі Sync Day.\nDesprГғВ©s de Sync Day, tota l'activitat es registrarГғВ  en aquell dia fins que tornis a prГғВ©mer Sync Day l'endemГғВ .\n3. Gaudeix de \"Reading Stats\", \"Reading Heatmap\".\n4. Opcional. A \"Settings > Apps > Reading Stats\" podrГғВ s personalitzar, reiniciar i modificar les estadГғВӯstiques.\n\nOpcional: si vols tenir llibres sense estadГғВӯstiques, crea un directori anomenat /ignore_stats/ i posa-hi els teus EPUB."
STR_README_BOOKMARKS_BODY: "Mentre un llibre estГғВ  obert:\n- Si manteniu premuda la tecla d'acord inferior, la pГғВ gina actual es desa com a marcador.\n- Si toqueu la mateixa tecla rГғВ pidament, s'obre un menГғВә perquГғВЁ pugueu comprovar rГғВ pidament les adreces d'interГғВЁs.\n- Per suprimir un marcador, torneu a mantenir premut el mateix botГғВі mentre el marcador estigui seleccionat."
STR_README_SLEEP_BODY: "Personalitzeu les pantalles de son tant com vulgueu.\nPodeu tenir diferents directoris, triar quin utilitzar, navegar per les imatges lentament i fins i tot decidir si l'ordre ГғВ©s aleatori o seqГғВјencial.\n\nPodeu crear carpetes addicionals sempre que comencin per sleep_, per exemple: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "A ConfiguraciГғВі > Aplicacions > Dreceres podeu:\n- tria quines aplicacions es mostren a Inici o a Aplicacions\n- Canvieu l'ordre de qualsevol aplicaciГғВі a les dues pantalles"
STR_README_ACHIEVEMENTS_BODY: "Recordeu utilitzar el Dia de sincronitzaciГғВі cada dia perquГғВЁ la majoria dels assoliments es puguin fer un seguiment correcte.\nAchievements ГғВ©s un sistema de gamificaciГғВі senzill amb objectius de lectura i fites per desbloquejar."
STR_README_IF_FOUND_BODY: "Una aplicaciГғВі que ajuda algГғВә a tornar el dispositiu si es perd.\n\nEscriure en aquest dispositiu ГғВ©s dolorГғВіs, de manera que si afegiu un fitxer anomenat if_found.txt a la targeta SD, el seu contingut es mostrarГғВ  quan s'obri aquesta aplicaciГғВі.\n\nHi pots escriure el que vulguis: una frase, un nГғВәmero de telГғВЁfon, un correu electrГғВІnic..."
