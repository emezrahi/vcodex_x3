STR_README_TOPIC_SHORTCUTS: "Tilpas Home og Apps"
STR_README_SYNC_DAY_BODY: "Xteink X4 skal ikke behandles, som om den havde et pГғВҘlideligt realtidsur, der overlever sГғВёvn pГғВҘ en pГғВҘlidelig mГғВҘde. SГғВҘ denne gaffel bruger en praktisk model:\n\n1. Sync Day opretter forbindelse via Wi-Fi og henter den aktuelle dato/tid ved hjГғВҰlp af NTP.\n2. Denne dato bliver den gyldige reference for statistik.\n3. Hvis enheden senere mister et gyldigt aktuelt ur, falder firmwaren tilbage til den sidst gemte gyldige dato.\n4. NГғВҘr overskriften viser en reservedato i stedet for en ny synkroniseret dato, er den markeret med !.\n\nPraktisk betydning:\n- en synkronisering om dagen fГғВёr lГғВҰsning er normalt nok\n- derefter fortsГғВҰtter statistikken med at bruge den sidste gyldige gemte dag\n- hvis den rigtige dag ГғВҰndrer sig, bГғВёr du synkronisere igen\n\nSom standard er tidszonen \"Spanien / Madrid\". Du kan vГғВҰlge din egen tidszone og datoformat i Indstillinger > Apps."
STR_README_STATS_BODY: "Regler:\n- Du skal forbinde til WiГўвӮ¬вҖҳFi 1 gang om dagen.\n- Der krГғВҰves mindst 3 minutters lГғВҰsning, fГғВёr data tГғВҰller.\n\nFor at registrere statistik er det nГғВёdvendigt fГғВёrst at identificere dagen.\n1. Konfigurer WiГўвӮ¬вҖҳFi-forbindelsen pГғВҘ forhГғВҘnd.\n2. Tryk 1 gang om dagen (fГғВёr du lГғВҰser) pГғВҘ knappen Sync Day.\nEfter Sync Day registreres al aktivitet pГғВҘ den dag, indtil du trykker pГғВҘ Sync Day igen nГғВҰste dag.\n3. Nyd \"Reading Stats\", \"Reading Heatmap\".\n4. Valgfrit. I \"Settings > Apps > Reading Stats\" kan du tilpasse, nulstille og ГғВҰndre statistikken.\n\nValgfrit: hvis du vil have bГғВёger uden statistik, sГғВҘ opret en mappe med navnet /ignore_stats/ og lГғВҰg dine EPUB-filer der."
STR_README_BOOKMARKS_BODY: "Mens en bog er ГғВҘben:\n- Hvis du holder den nederste OK-tast nede, gemmes den aktuelle side som et bogmГғВҰrke.\n- Hvis du trykker hurtigt pГғВҘ den samme tast, ГғВҘbnes en menu, sГғВҘ du hurtigt kan tjekke bogmГғВҰrker.\n- For at slette et bogmГғВҰrke skal du holde den samme knap nede igen, mens bogmГғВҰrket er valgt."
STR_README_SLEEP_BODY: "Tilpas sГғВёvnskГғВҰrme sГғВҘ meget du vil.\nDu kan have forskellige mapper, vГғВҰlge hvilken du vil bruge, gennemse billederne langsomt og endda beslutte, om rГғВҰkkefГғВёlgen er tilfГғВҰldig eller sekventiel.\n\nDu kan oprette ekstra mapper, sГғВҘ lГғВҰnge de starter med sleep_, for eksempel: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "I Indstillinger > Apps > Genveje kan du:\n- vГғВҰlg, hvilke apps der skal vises i Home eller i Apps\n- ГғВҰndre rГғВҰkkefГғВёlgen af enhver app pГғВҘ begge skГғВҰrme"
STR_README_ACHIEVEMENTS_BODY: "Husk at bruge Sync Day hver dag, sГғВҘ de fleste prГғВҰstationer kan spores korrekt.\nAchievements er et simpelt gamification-system med lГғВҰsemГғВҘl og milepГғВҰle at lГғВҘse op."
STR_README_IF_FOUND_BODY: "En app, der hjГғВҰlper nogen med at returnere enheden, hvis den bliver vГғВҰk.\n\nDet er smertefuldt at skrive pГғВҘ denne enhed, sГғВҘ hvis du tilfГғВёjer en fil kaldet if_found.txt til SD-kortet, vil dens indhold blive vist, nГғВҘr denne app ГғВҘbnes.\n\nDu kan skrive alt, hvad du vil der: en sГғВҰtning, et telefonnummer, en e-mail..."
