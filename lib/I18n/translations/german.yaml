STR_README_SYNC_DAY_BODY: "Man sollte den Xteink X4 nicht so behandeln, als hûôÊtte er eine zuverlûôÊssige Echtzeituhr, die den Schlaf vertrauenswûô¥rdig ûô¥bersteht. Diese Gabel verwendet also ein praktisches Modell:\n\n1. Sync Day stellt eine Verbindung ûô¥ber WLAN her und ruft das aktuelle Datum/die aktuelle Uhrzeit ûô¥ber NTP ab.\n2. Dieses Datum wird zur gûô¥ltigen Referenz fûô¥r Statistiken.\n3. Wenn das GerûôÊt spûôÊter keine gûô¥ltige aktuelle Uhr mehr hat, greift die Firmware auf das zuletzt gespeicherte gûô¥ltige Datum zurûô¥ck.\n4. Wenn in der Kopfzeile ein Ersatzdatum anstelle eines neu synchronisierten Datums angezeigt wird, ist es mit ! gekennzeichnet.\n\nPraktische Bedeutung:\n- Eine Synchronisierung pro Tag vor dem Lesen reicht normalerweise aus\n- Danach verwenden die Statistiken weiterhin den letzten gûô¥ltigen gespeicherten Tag\n- Wenn sich der tatsûôÊchliche Tag ûôÊndert, sollten Sie die Synchronisierung erneut durchfûô¥hren\n\nStandardmûôÊûé¡ig ist die Zeitzone ûÂã˜éƒSpanien / MadridûÂã˜é. Sie kûôÑnnen unter Einstellungen > Apps Ihre eigene Zeitzone und Ihr eigenes Datumsformat auswûôÊhlen."
STR_README_STATS_BODY: "Regeln:\n- Du musst dich 1 Mal pro Tag mit WLAN verbinden.\n- Mindestens 3 Minuten Lesezeit sind nûôÑtig, damit Daten gezûôÊhlt werden.\n\nDamit Statistiken erfasst werden kûôÑnnen, muss zuerst der Tag identifiziert werden.\n1. Richte die WLAN-Verbindung vorher ein.\n2. Drûô¥cke 1 Mal pro Tag (vor dem Lesen) die Taste Sync Day.\nNach Sync Day wird alle AktivitûôÊt diesem Tag zugeordnet, bis du am nûôÊchsten Tag erneut Sync Day drûô¥ckst.\n3. Nutze \"Reading Stats\", \"Reading Heatmap\".\n4. Optional. Unter \"Settings > Apps > Reading Stats\" kannst du Statistiken anpassen, zurûô¥cksetzen und verwalten.\n\nOptional: Wenn du Bûô¥cher ohne Statistik mûôÑchtest, erstelle ein Verzeichnis namens /ignore_stats/ und lege dort deine EPUBs ab."
STR_README_BOOKMARKS_BODY: "WûôÊhrend ein Buch geûôÑffnet ist:\n- Wenn Sie die untere OK-Taste gedrûô¥ckt halten, wird die aktuelle Seite als Lesezeichen gespeichert.\n- Wenn Sie schnell auf dieselbe Taste tippen, ûôÑffnet sich ein Menûô¥, damit Sie Lesezeichen schnell ûô¥berprûô¥fen kûôÑnnen.\n- Um ein Lesezeichen zu lûôÑschen, halten Sie dieselbe Taste erneut gedrûô¥ckt, wûôÊhrend das Lesezeichen ausgewûôÊhlt ist."
STR_README_SLEEP_BODY: "Passen Sie die Schlafbildschirme so an, wie Sie mûôÑchten.\nSie kûôÑnnen verschiedene Verzeichnisse einrichten, auswûôÊhlen, welches Sie verwenden mûôÑchten, langsam durch die Bilder blûôÊttern und sogar entscheiden, ob die Reihenfolge zufûôÊllig oder sequentiell sein soll.\n\nSie kûôÑnnen zusûôÊtzliche Ordner erstellen, sofern diese mit ûÂã˜éƒsleep_ûÂã˜é beginnen, zum Beispiel: ûÂã˜éƒsleep_booksûÂã˜é, ûÂã˜éƒsleep_geekûÂã˜é, ûÂã˜éƒsleep_disneyûÂã˜é, ûÂã˜éƒsleep_mangaûÂã˜é ..."
STR_README_SHORTCUTS_BODY: "Unter Einstellungen > Apps > Verknûô¥pfungen kûôÑnnen Sie:\n- WûôÊhlen Sie aus, welche Apps auf der Startseite oder in Apps angezeigt werden\n- ûãndern Sie die Reihenfolge einer App auf beiden Bildschirmen"
STR_README_ACHIEVEMENTS_BODY: "Denken Sie daran, den Sync Day jeden Tag zu nutzen, damit die meisten Erfolge korrekt nachverfolgt werden kûôÑnnen.\nAchievements ist ein einfaches Gamification-System mit freizuschaltenden Lesezielen und Meilensteinen."
STR_README_IF_FOUND_BODY: "Eine App, die jemandem hilft, das GerûôÊt zurûô¥ckzugeben, wenn es verloren geht.\n\nDas Tippen auf diesem GerûôÊt ist mûô¥hsam. Wenn Sie also eine Datei namens if_found.txt zur SD-Karte hinzufûô¥gen, wird deren Inhalt angezeigt, wenn diese App geûôÑffnet wird.\n\nSie kûôÑnnen dort alles schreiben, was Sie wollen: einen Satz, eine Telefonnummer, eine E-Mail ..."
