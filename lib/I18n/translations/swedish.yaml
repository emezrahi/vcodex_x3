STR_README_GITHUB_HINT: "Mer information om GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Anpassa hem och appar"
STR_README_SYNC_DAY_BODY: "Xteink X4 ska inte behandlas som om den hade en pГғВҘlitlig realtidsklocka som ГғВ¶verlever sГғВ¶mnen pГғВҘ ett tillfГғВ¶rlitligt sГғВӨtt. SГғВҘ den hГғВӨr gaffeln anvГғВӨnder en praktisk modell:\n\n1. Sync Day ansluter via Wi-Fi och hГғВӨmtar aktuellt datum/tid med NTP.\n2. Det datumet blir den giltiga referensen fГғВ¶r statistik.\n3. Om enheten senare tappar en giltig aktuell klocka, faller den fasta programvaran tillbaka till det senast sparade giltiga datumet.\n4. NГғВӨr rubriken visar ett reservdatum istГғВӨllet fГғВ¶r ett nytt synkroniserat datum ГғВӨr det markerat med !.\n\nPraktisk betydelse:\n- en synkning per dag innan lГғВӨsning brukar rГғВӨcka\n- efter det fortsГғВӨtter statistiken att anvГғВӨnda den senast giltiga sparade dagen\n- om den verkliga dagen ГғВӨndras bГғВ¶r du synkronisera igen\n\nSom standard ГғВӨr tidszonen \"Spanien / Madrid\". Du kan vГғВӨlja din egen tidszon och datumformat i InstГғВӨllningar > Appar."
STR_README_STATS_BODY: "Regler:\n- Du mГғВҘste ansluta till WiГўвӮ¬вҖҳFi 1 gГғВҘng per dag.\n- Minst 3 minuters lГғВӨsning krГғВӨvs fГғВ¶r att data ska rГғВӨknas.\n\nFГғВ¶r att kunna registrera statistik mГғВҘste dagen fГғВ¶rst identifieras.\n1. Konfigurera WiГўвӮ¬вҖҳFi-anslutningen i fГғВ¶rvГғВӨg.\n2. Tryck 1 gГғВҘng per dag (innan du lГғВӨser) pГғВҘ knappen Sync Day.\nEfter Sync Day registreras all aktivitet pГғВҘ den dagen tills du trycker pГғВҘ Sync Day igen nГғВӨsta dag.\n3. Njut av \"Reading Stats\", \"Reading Heatmap\".\n4. Valfritt. I \"Settings > Apps > Reading Stats\" kan du anpassa, ГғВҘterstГғВӨlla och ГғВӨndra statistiken.\n\nValfritt: om du vill ha bГғВ¶cker utan statistik, skapa en mapp som heter /ignore_stats/ och lГғВӨgg dina EPUB-filer dГғВӨr."
STR_README_BOOKMARKS_BODY: "Medan en bok ГғВӨr ГғВ¶ppen:\n- Om du hГғВҘller ned den nedre OK-tangenten sparas den aktuella sidan som ett bokmГғВӨrke.\nГўвӮ¬вҖң Om du trycker pГғВҘ samma knapp snabbt ГғВ¶ppnas en meny sГғВҘ att du snabbt kan kontrollera bokmГғВӨrken.\n- FГғВ¶r att radera ett bokmГғВӨrke, hГғВҘll nere samma knapp igen medan bokmГғВӨrket ГғВӨr valt."
STR_README_SLEEP_BODY: "Anpassa viloskГғВӨrmar sГғВҘ mycket du vill.\nDu kan ha olika kataloger, vГғВӨlja vilken du vill anvГғВӨnda, blГғВӨddra lГғВҘngsamt igenom bilderna och till och med bestГғВӨmma om ordningen ГғВӨr slumpmГғВӨssig eller sekventiell.\n\nDu kan skapa extra mappar sГғВҘ lГғВӨnge de bГғВ¶rjar med sleep_, till exempel: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "I InstГғВӨllningar > Appar > GenvГғВӨgar kan du:\n- vГғВӨlj vilka appar som ska visas i hemmet eller i appar\n- ГғВӨndra ordningen fГғВ¶r valfri app pГғВҘ bГғВҘda skГғВӨrmarna"
STR_README_ACHIEVEMENTS_BODY: "Kom ihГғВҘg att anvГғВӨnda Sync Day varje dag sГғВҘ att de flesta prestationer kan spГғВҘras korrekt.\nAchievements ГғВӨr ett enkelt gamification-system med lГғВӨsningsmГғВҘl och milstolpar att lГғВҘsa upp."
STR_README_IF_FOUND_BODY: "En app som hjГғВӨlper nГғВҘgon att lГғВӨmna tillbaka enheten om den tappas bort.\n\nAtt skriva pГғВҘ den hГғВӨr enheten ГғВӨr smГғВӨrtsamt, sГғВҘ om du lГғВӨgger till en fil som heter if_found.txt pГғВҘ SD-kortet kommer dess innehГғВҘll att visas nГғВӨr den hГғВӨr appen ГғВ¶ppnas.\n\nDu kan skriva vad du vill dГғВӨr: en mening, ett telefonnummer, ett e-postmeddelande..."
STR_README_TOPIC_REPORTS_SUGGESTIONS: "Reports and suggestions"
STR_README_REPORTS_SUGGESTIONS_BODY: "https://github.com/franssjz/cpr-vcodex\n\nu/franssjz7 (reddit)"