STR_README_SYNC_DAY_BODY: "O Xteink X4 nÃ£o deve ser tratado como se tivesse um relÃ³gio confiÃ¡vel em tempo real que sobrevive ao sono de maneira confiÃ¡vel. Portanto, este garfo usa um modelo prÃ¡tico:\n\n1. O Sync Day se conecta via Wi-Fi e busca a data/hora atual usando NTP.\n2. Essa data passa a ser a referÃªncia vÃ¡lida para estatÃ­sticas.\n3. Se o dispositivo perder posteriormente um relÃ³gio atual vÃ¡lido, o firmware volta para a Ãºltima data vÃ¡lida salva.\n4. Quando o cabeÃ§alho mostra uma data substituta em vez de uma nova data sincronizada, ele Ã© marcado com!.\n\nSignificado prÃ¡tico:\n- uma sincronizaÃ§Ã£o por dia antes da leitura geralmente Ã© suficiente\n- depois disso, as estatÃ­sticas continuam usando o Ãºltimo dia salvo vÃ¡lido\n- se o dia real mudar, vocÃª deverÃ¡ sincronizar novamente\n\nPor padrÃ£o o fuso horÃ¡rio Ã© \"Espanha/Madrid\". VocÃª pode selecionar seu prÃ³prio fuso horÃ¡rio e formato de data em ConfiguraÃ§Ãµes > Aplicativos."
STR_README_STATS_BODY: "Regras:\n- Ã‰ necessÃ¡rio ligar-se ao Wiâ€‘Fi 1 vez por dia.\n- Ã‰ preciso ler pelo menos 3 minutos para que os dados contem.\n\nPara registar estatÃ­sticas Ã© necessÃ¡rio identificar o dia.\n1. Configure previamente a ligaÃ§Ã£o Wiâ€‘Fi.\n2. Prima 1 vez por dia (antes de ler) o botÃ£o Sync Day.\nDepois de Sync Day, toda a atividade serÃ¡ registada nesse dia atÃ© voltar a premir Sync Day no dia seguinte.\n3. Desfrute de \"Reading Stats\", \"Reading Heatmap\".\n4. Opcional. Em \"Settings > Apps > Reading Stats\" poderÃ¡ personalizar, repor e modificar as estatÃ­sticas.\n\nOpcional: se quiser livros sem estatÃ­sticas, crie uma pasta chamada /ignore_stats/ e coloque lÃ¡ os seus EPUB."
STR_README_BOOKMARKS_BODY: "Enquanto um livro estÃ¡ aberto:\n- Se vocÃª mantiver pressionada a tecla OK inferior, a pÃ¡gina atual serÃ¡ salva como marcador.\n- Se vocÃª tocar rapidamente na mesma tecla, um menu serÃ¡ aberto para que vocÃª possa verificar os favoritos rapidamente.\n- Para excluir um marcador, mantenha pressionado o mesmo botÃ£o novamente enquanto o marcador estiver selecionado."
STR_README_SLEEP_BODY: "Personalize as telas de suspensÃ£o o quanto quiser.\nVocÃª pode ter diretÃ³rios diferentes, escolher qual usar, navegar pelas imagens aos poucos e atÃ© decidir se a ordem Ã© aleatÃ³ria ou sequencial.\n\nVocÃª pode criar pastas extras desde que comecem com sleep_, por exemplo: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "Em ConfiguraÃ§Ãµes > Aplicativos > Atalhos vocÃª pode:\n- escolha quais aplicativos sÃ£o mostrados na pÃ¡gina inicial ou em aplicativos\n- altere a ordem de qualquer aplicativo nas duas telas"
STR_README_ACHIEVEMENTS_BODY: "Lembre-se de usar o Sync Day todos os dias para que a maioria das conquistas possa ser rastreada corretamente.\nConquistas Ã© um sistema de gamificaÃ§Ã£o simples com metas de leitura e marcos para desbloquear."
