STR_README_SYNC_DAY_BODY: "El Xteink X4 no debe tratarse como si tuviera un reloj en tiempo real fiable que sobreviva al reposo de forma confiable. Por eso este fork usa un modelo prÃ¡ctico:\n\n1. Sync Day se conecta por Wi-Fi y obtiene la fecha y hora actuales usando NTP.\n2. Esa fecha pasa a ser la referencia vÃ¡lida para las estadÃ­sticas.\n3. Si mÃ¡s tarde el dispositivo pierde un reloj actual vÃ¡lido, el firmware recurre a la Ãºltima fecha vÃ¡lida guardada.\n4. Cuando el encabezado muestra una fecha de respaldo en lugar de una fecha reciÃ©n sincronizada, se marca con !.\n\nEn la prÃ¡ctica:\n- normalmente basta con una sincronizaciÃ³n al dÃ­a antes de leer\n- despuÃ©s, las estadÃ­sticas siguen usando el Ãºltimo dÃ­a vÃ¡lido guardado\n- si cambia el dÃ­a real, deberÃ­as sincronizar de nuevo\n\nPor defecto la zona horaria es \"Spain / Madrid\". Puedes seleccionar tu propia zona horaria e incluso el formato de fecha desde Settings > Apps."
STR_README_STATS_BODY: "Reglas:\n- Â¡Necesitas conectarte al Wi-Fi 1 vez al dÃ­a!\n- MÃ­nimo 3 minutos de lectura para contabilizar datos.\n\nPara poder registrar estadÃ­sticas es necesario identificar el dÃ­a.\n1. Configura previamente la conexiÃ³n por Wi-Fi.\n2. Pulsa 1 vez al dÃ­a (antes de leer) el botÃ³n Sync Day.\nDespuÃ©s de Sync Day toda la actividad se registrarÃ¡ a ese dÃ­a hasta que vuelvas a pulsar Sync Day al dÃ­a siguiente.\n3. Disfruta de \"Reading Stats\", \"Reading Heatmap\" y \"Reading Day\".\n4. Opcional. En \"Settings > Apps > Reading Stats\" podrÃ¡s personalizar, reiniciar y modificar las estadÃ­sticas.\n\nOpcional: si deseas tener libros sin estadÃ­sticas, es decir, que se ignore el registro de stats, crea un directorio llamado /ignore_stats/ y pon allÃ­ tus EPUB."
STR_README_BOOKMARKS_BODY: "Cuando tengas un libro abierto:\n- Si mantienes pulsada la tecla inferior de OK, guardarÃ¡s la pÃ¡gina actual como marcador.\n- Si haces un clic rÃ¡pido en la misma tecla, se abrirÃ¡ un menÃº para consultar rÃ¡pidamente los marcadores.\n- Para borrar un marcador, vuelve a mantener pulsado el mismo botÃ³n cuando el marcador estÃ© seleccionado."
STR_README_SLEEP_BODY: "Personaliza al mÃ¡ximo las pantallas de reposo.\nPuedes tener diferentes directorios, seleccionar cuÃ¡l quieres usar, navegar lentamente entre las fotos e incluso indicar si quieres que sigan un orden aleatorio o secuencial.\n\nPuedes crear carpetas adicionales siempre que empiecen por sleep_, por ejemplo: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "En Settings > Apps > Shortcuts podrÃ¡s:\n- indicar si cada app pertenece a Home o a Apps\n- indicar si cada acceso directo se muestra o queda oculto\n- alterar el orden de las apps en ambas pantallas"
STR_README_ACHIEVEMENTS_BODY: "Recuerda usar Sync Day cada dÃ­a para que la mayorÃ­a de los logros se registren correctamente.\nLogros es un sistema simple de gamificaciÃ³n con metas e hitos de lectura por desbloquear."
STR_README_IF_FOUND_BODY: "Una app para que, en caso de pÃ©rdida, alguien pueda ver datos de contacto e intentar devolver el dispositivo.\n\nEscribir desde este dispositivo es horrible, asÃ­ que si aÃ±ades a la tarjeta SD un fichero llamado if_found.txt, su contenido se mostrarÃ¡ al abrir esta app.\n\nPuedes poner lo que quieras: una frase, un telÃ©fono, un correo electrÃ³nico..."
